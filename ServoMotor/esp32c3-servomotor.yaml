esphome:
  name: esp32c3-servomotor
  friendly_name: esp32c3-servomotor

esp32:
  board: nologo_esp32c3_super_mini
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "xG5WOgv93eLYs3av8iVtuvFi9zfUrOuX8kuFhySPVGQ="

ota:
  - platform: esphome
    password: "e3b9d0285c18a68331b6b4492d15e9f3"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32C3-Servomotor"
    password: "RcxMKJhULBqX"

captive_portal:
    

# Example configuration entry
servo:
  - id: my_servo
    output: pwm_output
    min_level: 3%     # optional: change from the 3% default to adjust for your servo
    max_level: 15%    # optional: change from the 12% default to adjust for your servo

# On ESP32, use ledc output
output:
  - platform: ledc
    id: pwm_output
    pin: GPIO5
    frequency: 50Hz

# automation 
number:
  - platform: template
    name: Servo Control
    min_value: -100     # left most value
    initial_value: 0
    max_value: 100      # right most value
    step: 1
    optimistic: true
    set_action:
      then:
        - servo.write:
            id: my_servo
            level: !lambda 'return x / 100.0;'